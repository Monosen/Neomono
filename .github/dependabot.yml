version: 2
updates:
  # npm / pnpm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      eslint:
        patterns:
          - eslint
          - "@eslint/*"
          - typescript-eslint
      types:
        patterns:
          - "@types/*"
      vscode-tooling:
        patterns:
          - "@vscode/*"
          - vsce
          - ovsx

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
