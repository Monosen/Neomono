name: 🐞 Bug report
description: Report a problem with the Neomono theme or the Neon Dreams effect.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in the information below to help us reproduce the issue.
  - type: input
    id: vscode-version
    attributes:
      label: VS Code version
      description: "Help > About (or `code --version`)"
      placeholder: "1.95.0"
    validations:
      required: true
  - type: input
    id: neomono-version
    attributes:
      label: Neomono version
      placeholder: "0.0.8"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15 / Windows 11 / Ubuntu 24.04"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What did you expect to happen? What happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
      description: Drag and drop images here if they help.
