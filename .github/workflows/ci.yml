name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    name: Validate theme and package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run linter
        run: npm run lint

      - name: Compile TypeScript
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Validate theme JSON and colors
        run: npm run validate:theme

      - name: Validate commands registered
        run: node scripts/validate-commands.js

      - name: Validate i18n synchronization
        run: node scripts/validate-i18n.js

      - name: Package extension
        run: npx --yes @vscode/vsce package --no-git-tag-version --no-update-package-json -o neomono.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: neomono-vsix
          path: neomono.vsix
          retention-days: 14
